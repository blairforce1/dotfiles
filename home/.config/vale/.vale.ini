# Real config, symlinked into ~/.config/vale/.vale.ini by home.nix via
# mkOutOfStoreSymlink. Edit this file directly -- no rebuild needed. This is
# also Vale's own default global config path (see `vale ls-dirs`), so it
# applies to every project, not just this repo -- no per-project .vale.ini
# needed.

StylesPath = styles
MinAlertLevel = suggestion

Packages = write-good

[*.{md,txt}]
BasedOnStyles = Vale, write-good, Dotfiles
